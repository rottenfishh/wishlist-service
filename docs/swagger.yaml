basePath: /
definitions:
  dto.CreateGiftRequest:
    properties:
      description:
        type: string
      link:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      priority:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - name
    - priority
    type: object
  dto.CreateWishlistRequest:
    properties:
      date:
        type: string
      description:
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - date
    - title
    type: object
  dto.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  dto.GiftResponse:
    properties:
      booked:
        type: boolean
      description:
        type: string
      id:
        type: integer
      link:
        type: string
      name:
        type: string
      priority:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.Token:
    properties:
      token:
        type: string
    type: object
  dto.UpdateGiftRequest:
    properties:
      description:
        type: string
      link:
        type: string
      name:
        maxLength: 255
        minLength: 1
        type: string
      priority:
        maximum: 5
        minimum: 1
        type: integer
    type: object
  dto.UpdateWishlistRequest:
    properties:
      date:
        type: string
      description:
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  dto.WishlistDetailsResponse:
    properties:
      date:
        type: string
      description:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.GiftResponse'
        type: array
      title:
        type: string
      token:
        type: string
    type: object
  dto.WishlistResponse:
    properties:
      date:
        type: string
      description:
        type: string
      id:
        type: integer
      title:
        type: string
      token:
        type: string
    type: object
  model.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Wishlist service for creating wishlists, adding items, sharing public
    link for wishlists and booking gifts
  title: Wishlist service
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates user with email and password, returns JWT token for
        subsequent requests
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT token
          schema:
            $ref: '#/definitions/dto.Token'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email, password and optional role.
        Password is hashed before storing.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/model.User'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: User with this email already exists
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /api/public/wishlists/{token}/gifts/{id}:
    post:
      description: Books a gift by public wishlist token
      parameters:
      - description: Wishlist public token (UUID)
        in: path
        name: token
        required: true
        type: string
      - description: Gift ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GiftResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Book gift
      tags:
      - gifts
  /api/public/wishlists/token/{token}:
    get:
      description: Returns public wishlist details by token
      parameters:
      - description: Wishlist public token (UUID)
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WishlistDetailsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get wishlist with items by public token
      tags:
      - wishlists
  /api/wishlists:
    get:
      description: Returns all wishlists of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.WishlistResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List wishlists
      tags:
      - wishlists
    post:
      consumes:
      - application/json
      description: Creates a new wishlist for the authenticated user
      parameters:
      - description: Wishlist data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateWishlistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.WishlistResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create wishlist
      tags:
      - wishlists
  /api/wishlists/{wishlistId}/gifts:
    post:
      consumes:
      - application/json
      description: Creates a new gift in the specified wishlist owned by the authenticated
        user
      parameters:
      - description: Wishlist ID
        in: path
        name: wishlistId
        required: true
        type: integer
      - description: Gift data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateGiftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GiftResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create gift
      tags:
      - gifts
  /api/wishlists/{wishlistId}/gifts/{id}:
    delete:
      description: Deletes a gift from the specified wishlist owned by the authenticated
        user
      parameters:
      - description: Wishlist ID
        in: path
        name: wishlistId
        required: true
        type: integer
      - description: Gift ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GiftResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete gift
      tags:
      - gifts
    get:
      description: Get gift of given wishlist for the authenticated owner
      parameters:
      - description: Wishlist ID
        in: path
        name: wishlistId
        required: true
        type: integer
      - description: Gift ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GiftResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get gift by ID
      tags:
      - gifts
    put:
      consumes:
      - application/json
      description: Updates a gift in the specified wishlist owned by the authenticated
        user
      parameters:
      - description: Wishlist ID
        in: path
        name: wishlistId
        required: true
        type: integer
      - description: Gift ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated gift data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateGiftRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GiftResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update gift
      tags:
      - gifts
  /api/wishlists/details/{id}:
    delete:
      description: Deletes a wishlist owned by the authenticated user
      parameters:
      - description: Wishlist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WishlistResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete wishlist
      tags:
      - wishlists
    get:
      description: Get wishlist with items for the authenticated owner
      parameters:
      - description: Wishlist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WishlistDetailsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get wishlist by ID
      tags:
      - wishlists
    put:
      consumes:
      - application/json
      description: Updates a wishlist owned by the authenticated user
      parameters:
      - description: Wishlist ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated wishlist data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateWishlistRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WishlistResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update wishlist
      tags:
      - wishlists
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and the JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
